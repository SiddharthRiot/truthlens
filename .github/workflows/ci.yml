name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: truthlens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/truthlens_test
      SECRET_KEY: test-secret-key

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend Build + Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint || echo "No lint script"

      - name: Build check
        run: npm run build
        env:
          CI: false

  api-test:
    name: API Integration Test
    runs-on: ubuntu-latest
    needs: backend  # 👈 backend pass hone ke baad chale

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: truthlens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/truthlens_test
      SECRET_KEY: test-secret-key

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start backend
        run: uvicorn main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for server
        run: |
          for i in {1..15}; do
            curl -sf http://127.0.0.1:8000/ && break
            sleep 2
          done

      - name: Test root endpoint
        run: curl -sf http://127.0.0.1:8000/

      - name: Test analyze endpoint
        run: |
          curl -sf -X POST http://127.0.0.1:8000/api/analyze \
          -H "Content-Type: application/json" \
          -d '{"text":"India economy is growing fast"}' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['success'] == True, 'Analysis failed'
          assert 'analysis' in data, 'No analysis in response'
          print('API test passed!')
          "